<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebCore5.8</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="most-main-container">

    <!-- ===============================MENU===================================================== -->
    <header class="container">
            <img class="icon menu-icon" src="Img/Menu icon.png" alt="Menu icon">
            <div class="divider-tablet"></div>
            <img class="logo-group" src="Img/Logo group.png" alt="Logo group">
            <div class="divider"></div>
            <img class="icon call-icon" src="Img/Call Icon.png" alt="Call icon">
            <img class="icon chat-icon" src="Img/Chat Icon.png" alt="Chat icon">
            <img class="icon profile-icon" src="Img/Profile Icon.png" alt=" Profile icon">
            <div class="divider-tablet-two"></div>
            <label class="label-text">Submit a request</label><img class="icon repair-icon" src="Img/Repair icon.png" alt="Repair icon">
            <label class="label-text">Repair status</label><img class="icon search-icon" src="Img/Search icon.png" alt="Search icon">          
    </header>

<!-- ===============================Header===================================================== -->
    <main class="main-container">

        <!-- ======================Mark and h1================== -->
        <div class="header">
            <div class="mark"></div>
            <h1>Services and support</h1>
        </div>

        <!-- ===========Navigation Scrollbar============================= -->
        <div class="menu">
            <ul class="navbar">
                <li class="devices-we-repair nav-item">Devices we repair</li>
                <li class="services nav-item">Services</li>
                <li class="service-prices nav-item">Service prices</li>
                <li class="special-prices nav-item">Special prices</li>
            </ul>
        </div>

         <!-- =============Main-text, Expand-icon, Hero-img================== -->
        <div class="small-container">

            <div class="small">
                
                <p class="text">We are an authorized service centre for Dell equipment repairs. Only with us can you repair your Dell laptop with the official manufacturer's warranty.</p>
                
                <!-- ============================================= -->
                <div class="read-more-container">
                    <img class="expand-icon" src="Img/Expand icon.png" alt="Expand icon">
                    <span class="read-more">Read more</span>
                </div>

            </div>

             <img class="hero" src="Img/Picture container.png" alt="Picture container">

        </div>
    </main>
  </div>
</body>
</html>
